<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Diagrama de conexión DHT11 al ESP32 WROOM-32</title>
  <desc>Muestra cómo conectar el sensor DHT11 de 3 pines al ESP32 WROOM-32 usando cables rojo (3.3V), negro (GND) y amarillo (señal GPIO4)</desc>

  <!-- ESP32 -->
  <rect x="380" y="60" width="180" height="300" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="470" y="86" text-anchor="middle" fill="#0C447C">ESP32</text>
  <text font-family="sans-serif" font-size="12" x="470" y="104" text-anchor="middle" fill="#185FA5">WROOM-32</text>

  <!-- Pines ESP32 -->
  <rect x="366" y="118" width="14" height="12" rx="2" fill="#C04828" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="11" x="374" y="175" text-anchor="middle" fill="#0C447C">3.3V</text>
  <rect x="366" y="148" width="14" height="12" rx="2" fill="#2C2C2A" stroke="#444441" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="11" x="374" y="195" text-anchor="middle" fill="#0C447C">GND</text>
  <rect x="366" y="178" width="14" height="12" rx="2" fill="#BA7517" stroke="#854F0B" stroke-width="1"/>
  <text font-family="sans-serif" font-size="11" x="374" y="215" text-anchor="middle" fill="#0C447C">GPIO4</text>

  <!-- DHT11 -->
  <rect x="100" y="130" width="120" height="160" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="160" y="196" text-anchor="middle" fill="#085041">DHT11</text>
  <text font-family="sans-serif" font-size="12" x="160" y="216" text-anchor="middle" fill="#0F6E56">3 pines</text>

  <!-- Pines DHT11 -->
  <rect x="220" y="148" width="14" height="12" rx="2" fill="#C04828" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="11" x="160" y="157" text-anchor="middle" fill="#085041">+ (VCC)</text>
  <rect x="220" y="178" width="14" height="12" rx="2" fill="#2C2C2A" stroke="#444441" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="11" x="160" y="187" text-anchor="middle" fill="#085041">- (GND)</text>
  <rect x="220" y="208" width="14" height="12" rx="2" fill="#BA7517" stroke="#854F0B" stroke-width="1"/>
  <text font-family="sans-serif" font-size="11" x="160" y="217" text-anchor="middle" fill="#085041">S (datos)</text>

  <!-- Cables -->
  <polyline points="234,154 300,154 300,124 366,124" fill="none" stroke="#C04828" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="234,184 320,184 320,154 366,154" fill="none" stroke="#2C2C2A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="234,214 340,214 340,184 366,184" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leyenda -->
  <rect x="80" y="330" width="520" height="60" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="350" text-anchor="middle" fill="#2C2C2A">Leyenda de cables</text>
  <line x1="110" y1="372" x2="150" y2="372" stroke="#C04828" stroke-width="2.5" stroke-linecap="round"/>
  <text font-family="sans-serif" font-size="12" x="158" y="376" fill="#2C2C2A">3.3V - alimentacion</text>
  <line x1="290" y1="372" x2="330" y2="372" stroke="#2C2C2A" stroke-width="2.5" stroke-linecap="round"/>
  <text font-family="sans-serif" font-size="12" x="338" y="376" fill="#2C2C2A">GND - tierra</text>
  <line x1="460" y1="372" x2="500" y2="372" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round"/>
  <text font-family="sans-serif" font-size="12" x="508" y="376" fill="#2C2C2A">senal - GPIO4</text>
</svg>
